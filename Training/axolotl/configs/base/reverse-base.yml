# Shared Axolotl baseline for reverse SFT.
# Final runnable configs are generated by scripts/render_axolotl_config.py.

base_model: "__BASE_MODEL__"
chat_template: "tokenizer_default"
adapter: "qlora"
load_in_4bit: true
strict: false

sequence_len: 8192
sample_packing: false
pad_to_sequence_len: true
train_on_inputs: false
group_by_length: false

micro_batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 1
max_steps: 20
learning_rate: 0.00002
optimizer: "adamw_bnb_8bit"
lr_scheduler: "cosine"
gradient_checkpointing: true

lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true

dataset_prepared_path: "__DATASET_PREPARED_PATH__"
output_dir: "__OUTPUT_DIR__"
save_steps: 25
logging_steps: 1

datasets:
  - path: "__TRAIN_FILE__"
    type: "chat_template"
    field_messages: "messages"
